# fly.toml app configuration file
# See https://fly.io/docs/reference/configuration/ for more information

app = "website-auditor"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8501"

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "10s"
    grace_period = "30s"
    method = "get"
    path = "/_stcore/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
